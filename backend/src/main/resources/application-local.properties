# Perfil local para arrancar sin DB ni API key de Gemini
# Activa con: --spring.profiles.active=local

# H2 en memoria
spring.datasource.url=jdbc:h2:mem:appbit;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate con H2
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Inicialización de data.sql
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=true

# Agente IA: sin clave por defecto (el matching cae al fallback por reglas).
# Para probar con IA real, exporta tu propia clave antes de levantar el backend
# (no hace falta editar este archivo) — ver README.md "Configurar tu propia clave de IA":
#   export SPRING_AI_OPENAI_API_KEY=tu-clave
#   export SPRING_AI_OPENAI_BASE_URL=https://tu-proveedor
#   export SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL=tu-modelo
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:disabled}
spring.ai.openai.base-url=${SPRING_AI_OPENAI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai/}
spring.ai.openai.chat.options.model=${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:llama-3.3-70b-versatile}

# Jackson: incluir campos null en respuestas
spring.jackson.default-property-inclusion=always
