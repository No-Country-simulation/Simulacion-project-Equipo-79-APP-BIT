# Perfil local para arrancar sin DB ni API key de Gemini
# Activa con: --spring.profiles.active=local

# H2 en memoria
spring.datasource.url=jdbc:h2:mem:appbit;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate con H2
spring.jpa.hibernate.ddl-auto=create
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Inicialización de data.sql
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
spring.sql.init.continue-on-error=true

# Deshabilitar agente IA (no tenemos API key)
spring.ai.openai.api-key=disabled

# Jackson: incluir campos null en respuestas
spring.jackson.default-property-inclusion=always
