# ==========================================
# CONFIGURACIoN DEL AGENTE IA (BE3)
# Cada integrante puede usar su propia clave/proveedor sin tocar este archivo:
# exporta las variables de entorno de abajo antes de levantar el backend.
# Ver README.md -> "Configurar tu propia clave de IA" para más detalle y ejemplos
# (Gemini, DeepSeek vía NVIDIA build, OpenCode Zen, OpenAI, etc.)
# ==========================================
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY:disabled}
spring.ai.openai.base-url=${SPRING_AI_OPENAI_BASE_URL:https://api.groq.com/openai}
spring.ai.openai.chat.options.model=${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL:llama-3.3-70b-versatile}
spring.ai.openai.chat.options.temperature=0.2

# ==========================================
# HILOS VIRTUALES Y JPA / HIBERNATE
# ==========================================
spring.threads.virtual.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# data.sql inserta IDs fijos sin ON CONFLICT; con ddl-auto=update la tabla ya
# tiene esas filas después del primer arranque, así que continue-on-error evita
# que el reseed truene el startup y de paso deja de borrar la BD real en cada deploy.
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

spring.jpa.defer-datasource-initialization=true

spring.h2.console.enabled=true

# Jackson: incluir campos null en respuestas (importante para DTOs de Company/Job)
spring.jackson.default-property-inclusion=always