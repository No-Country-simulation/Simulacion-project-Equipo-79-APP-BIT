spring.application.name=backend

# DB - MySQL (local default; override via env vars)
#spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/appbit}
#spring.datasource.username=${DB_USERNAME:root}
#spring.datasource.password=${DB_PASSWORD:}
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# DB - PostgreSQL (alternative; override via env vars)
#spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/appbit}
#spring.datasource.username=${DB_USERNAME:postgres}
#spring.datasource.password=${DB_PASSWORD:}
#spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracion del motor de Inteligencia Artificial
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY}
spring.ai.openai.chat.options.model=gemini-2.5-flash
spring.ai.openai.chat.options.temperature=0.2

# Activacion de Hilos Virtuales de Java 21 para soportar la concurrencia de las llamadas al LLM
spring.threads.virtual.enabled=true

# Configuraciones JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true
