spring.application.name=backend

# DB - MySQL (local default; override via env vars)
#spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/appbit}
#spring.datasource.username=${DB_USERNAME:root}
#spring.datasource.password=${DB_PASSWORD:}
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# CONFIGURACION DE BASE DE DATOS
# ==========================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# CONFIGURACIoN DEL AGENTE IA (BE3)
# ==========================================
spring.ai.openai.api-key=${SPRING_AI_OPENAI_API_KEY}
spring.ai.openai.base-url=https://generativelanguage.googleapis.com/v1beta/openai/
spring.ai.openai.chat.options.model=gemini-2.5-flash
spring.ai.openai.chat.options.temperature=0.2

# ==========================================
# HILOS VIRTUALES Y JPA / HIBERNATE
# ==========================================
spring.threads.virtual.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# data.sql inserta IDs fijos sin ON CONFLICT; con ddl-auto=update la tabla ya
# tiene esas filas después del primer arranque, así que continue-on-error evita
# que el reseed truene el startup y de paso deja de borrar la BD real en cada deploy.
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

spring.jpa.defer-datasource-initialization=true

#spring.h2.console.enabled=true

# Jackson: incluir campos null en respuestas (importante para DTOs de Company/Job)
spring.jackson.default-property-inclusion=always